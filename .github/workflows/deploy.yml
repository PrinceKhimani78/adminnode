name: Deploy AdminNode

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.rojgariindia.com/api

      - name: Compress Release
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cd .next/standalone
          tar -czf ../../release.tar.gz .

      - name: Upload Tarball
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "release.tar.gz"
          target: "/home/admin.rojgariindia.com/"
          overwrite: true

      - name: Extract and Restart PM2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Use binary installs only, never compile from source on small VPS
            export NVM_NODEJS_ORG_MIRROR=https://nodejs.org/dist
            nvm use 20 || (rm -rf "$NVM_DIR/versions/node/v20.20.2" && nvm install 20 --bin)
            nvm use 20
            
            echo "🚀 Starting adminnode deployment..."

            cd /home/admin.rojgariindia.com/

            # Ensure tar exists before extracting
            if [ ! -f release.tar.gz ]; then
              echo "❌ release.tar.gz not found!"
            fi

            rm -rf release
            mkdir release

            tar -xzf release.tar.gz -C release/
            rm -f release.tar.gz

            cd release

            # Restart app safely
            pm2 delete adminnode || true
            PORT=3022 pm2 start server.js --name adminnode
            pm2 save

            echo "✅ adminnode deployment complete! Checking status..."
            sleep 3
            pm2 list
            pm2 logs adminnode --lines 50 --nostream || true