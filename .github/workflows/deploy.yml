name: Deploy AdminNode

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy and Build on Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 45m
          script: |
            set -e
            export NVM_DIR=~/.nvm
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Ensure target directory exists
            mkdir -p /home/admin.rojgariindia.com/release
            cd /home/admin.rojgariindia.com/release

            # Initialize git if not present
            if [ ! -d ".git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/PrinceKhimani78/adminnode.git .
            fi

            # Pull latest changes
            echo "Pulling latest code..."
            git reset --hard
            git pull origin main

            # Install dependencies and build
            echo "Installing dependencies..."
            npm ci
            
            echo "Building Next.js app..."
            export NEXT_PUBLIC_API_URL=https://api.rojgariindia.com/api
            npm run build

            # Restart PM2 process
            echo "Restarting PM2..."
            pm2 delete adminnode || true
            PORT=3022 pm2 start npm --name adminnode -- start
            pm2 save
            
            echo "Deployment to adminnode complete!"
