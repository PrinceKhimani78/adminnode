name: Deploy AdminNode

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.rojgariindia.com/api

      - name: Compress Release
        run: tar -czf release.tar.gz .next public package.json package-lock.json next.config.js

      - name: Upload Tarball
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "release.tar.gz"
          target: "/home/admin.rojgariindia.com/"
          overwrite: true

      - name: Extract and Restart PM2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            export NVM_DIR=~/.nvm
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            mkdir -p /home/admin.rojgariindia.com/release
            cd /home/admin.rojgariindia.com/
            tar -xzf release.tar.gz -C release/
            rm release.tar.gz
            
            cd release
            npm ci --production
            
            pm2 delete adminnode || true
            PORT=3022 pm2 start npm --name adminnode -- start
            pm2 save
            
            echo "Deployment to adminnode complete!"
